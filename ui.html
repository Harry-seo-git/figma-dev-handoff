<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
:root{--blue:#18A0FB;--blue-hover:#0d8de6;--green:#22c55e;--orange:#f59e0b;--yellow:#eab308;--purple:#a855f7;--red:#ef4444;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;color:var(--gray-800);padding:16px;background:#fff;overflow-y:auto}
h2{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
label{display:block;font-weight:600;margin-bottom:4px;margin-top:14px;font-size:12px;color:var(--gray-600)}
.required::after{content:" *";color:var(--red)}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--gray-300);border-radius:6px;font-size:13px;font-family:inherit;color:var(--gray-800);background:#fff;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,160,251,.12)}
input.error,select.error{border-color:var(--red)}
textarea{resize:vertical;min-height:56px}
button{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;transition:all .15s}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-hover);transform:translateY(-1px);box-shadow:0 2px 8px rgba(24,160,251,.3)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{background:var(--gray-300);cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--gray-100);color:var(--gray-700)}
.btn-secondary:hover{background:var(--gray-200)}
.btn-small{width:auto;padding:4px 10px;font-size:11px;margin-top:0}
.btn-ghost{background:transparent;color:var(--gray-500);padding:4px 8px;width:auto;margin-top:0;font-size:11px}
.btn-ghost:hover{color:var(--blue);background:rgba(24,160,251,.08)}
.btn-danger{background:transparent;color:var(--red)}
.btn-danger:hover{background:#fef2f2}
.section{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;margin-bottom:12px}
.frame-list{max-height:160px;overflow-y:auto;margin-top:8px}
.frame-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border:1px solid var(--gray-200);border-radius:6px;margin-bottom:4px;font-size:12px;transition:border-color .15s}
.frame-item:hover{border-color:var(--blue)}
.frame-icon{font-size:14px;flex-shrink:0}
.frame-info{flex:1;min-width:0}
.frame-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frame-path{font-size:10px;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frame-meta{color:var(--gray-400);font-size:10px;flex-shrink:0;text-align:right}
.frame-actions{display:flex;gap:2px;flex-shrink:0}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.status-badge.dev-ready{background:#dcfce7;color:#166534}
.status-badge.review-needed{background:#fef3c7;color:#92400e}
.status-badge.in-progress{background:#dbeafe;color:#1e40af}
.status-badge.updated{background:#f3e8ff;color:#6b21a8}
.empty-state{text-align:center;padding:28px 16px;color:var(--gray-400)}
.empty-state .icon{font-size:36px;margin-bottom:8px;opacity:.6}
.empty-state .hint{font-size:11px;margin-top:4px;color:var(--gray-400)}
.settings-toggle{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--gray-400);cursor:pointer;margin-bottom:10px;user-select:none}
.settings-toggle:hover{color:var(--blue)}
.settings-panel{display:none;background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--radius);padding:12px;margin-bottom:12px}
.settings-panel.open{display:block}
.channel-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#fff;border:1px solid var(--gray-200);border-radius:6px;margin-bottom:4px;font-size:12px}
.channel-item .ch-name{flex:1;font-weight:600}
.channel-item .ch-url{flex:2;font-size:10px;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.channel-check{width:16px;height:16px;accent-color:var(--blue)}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
.overlay.show{display:flex}
.confirm-dialog{background:#fff;border-radius:12px;padding:20px;width:90%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.confirm-dialog h3{font-size:14px;margin-bottom:8px}
.confirm-dialog p{font-size:12px;color:var(--gray-500);margin-bottom:16px;line-height:1.5}
.confirm-dialog .actions{display:flex;gap:8px}
.confirm-dialog .actions button{flex:1}
.history-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:center}
.history-panel.show{display:flex}
.history-content{background:#fff;border-radius:12px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.history-item{padding:10px;border-left:3px solid var(--gray-200);margin-bottom:8px;font-size:12px}
.history-item .time{font-size:10px;color:var(--gray-400)}
.toast{position:fixed;bottom:-60px;left:16px;right:16px;padding:10px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;text-align:center;z-index:300;transition:bottom .3s ease}
.toast.success{background:#d1fae5;color:#065f46}
.toast.error{background:#fee2e2;color:#991b1b}
.toast.warning{background:#fef3c7;color:#92400e}
.toast.show{bottom:16px}
.summary-bar{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-500);margin-bottom:8px}
.summary-bar strong{color:var(--gray-700)}
.divider{border:none;border-top:1px solid var(--gray-200);margin:14px 0}
.thread-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:8px;font-size:9px;background:#dbeafe;color:#1e40af;margin-left:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sending{animation:pulse 1.2s infinite}
</style>
</head>
<body>

<!-- Settings Panel -->
<div class="settings-toggle" onclick="toggleSettings()">
  <span>&#9881;</span>
  <span>Slack 채널 설정</span>
  <span id="webhookIndicator" style="width:6px;height:6px;border-radius:50%;margin-left:4px;"></span>
</div>
<div id="settingsPanel" class="settings-panel">
  <label style="margin-top:0;">채널 관리</label>
  <div id="channelList" style="margin-bottom:8px;"></div>
  <div style="display:flex;gap:4px;margin-bottom:6px;">
    <input type="text" id="newChannelName" placeholder="#channel-name" style="flex:1" />
    <input type="url" id="newChannelUrl" placeholder="https://hooks.slack.com/services/..." style="flex:2" />
    <button type="button" class="btn-secondary btn-small" onclick="addChannel()" style="flex-shrink:0;width:auto;">추가</button>
  </div>
  <div style="font-size:10px;color:var(--gray-400);">각 채널에 Incoming Webhook URL을 등록하세요. 여러 채널에 동시 전송 가능합니다.</div>
</div>

<!-- Frame Selection -->
<div class="section">
  <h2>선택된 프레임</h2>
  <div id="frameContainer">
    <div class="empty-state">
      <div class="icon">&#128433;</div>
      <div>핸드오프할 프레임을 선택하세요</div>
      <div class="hint">Frame, Component, Section, Group 타입만 지원됩니다</div>
    </div>
  </div>
</div>

<!-- Handoff Form -->
<div id="formSection">
  <label for="designer" class="required">담당 디자이너</label>
  <input type="text" id="designer" placeholder="이름을 입력하세요" oninput="saveDesignerName()" />

  <label for="status" class="required">상태</label>
  <select id="status" onchange="updateStatusPreview()">
    <option value="dev-ready">&#128994; Dev Ready — 개발 착수 가능</option>
    <option value="review-needed">&#128992; Review Needed — 리뷰 필요</option>
    <option value="in-progress">&#128993; In Progress — 작업 중</option>
    <option value="updated">&#128309; Updated — 업데이트됨</option>
  </select>
  <div id="statusPreview" style="margin-top:6px;"></div>

  <label for="priority">우선순위</label>
  <select id="priority">
    <option value="normal">보통</option>
    <option value="high">&#128308; 높음 — 빠른 확인 필요</option>
    <option value="urgent">&#128680; 긴급 — 즉시 확인 필요</option>
  </select>

  <label for="jiraUrl">Jira 티켓 (선택)</label>
  <input type="url" id="jiraUrl" placeholder="https://your-domain.atlassian.net/browse/PROJ-123" />

  <label for="memo">메모 (선택)</label>
  <textarea id="memo" placeholder="개발팀에 전달할 메모를 입력하세요&#10;예: 반응형 breakpoint는 Figma 코멘트 참고"></textarea>

  <!-- 채널 선택 -->
  <label>전송 채널</label>
  <div id="sendChannelList" style="margin-top:4px;"></div>

  <hr class="divider" />

  <button id="sendBtn" class="btn-primary" onclick="confirmSend()" disabled>
    &#128232; Slack에 알림 보내기
  </button>
  <div style="text-align:center;margin-top:6px;">
    <span style="font-size:10px;color:var(--gray-400);">Ctrl+Enter로 빠르게 전송</span>
  </div>
</div>

<!-- Confirmation Dialog -->
<div id="confirmOverlay" class="overlay">
  <div class="confirm-dialog">
    <h3>&#128232; 알림을 보내시겠습니까?</h3>
    <div id="confirmSummary" style="font-size:12px;color:var(--gray-500);margin-bottom:16px;line-height:1.6;"></div>
    <div class="actions">
      <button class="btn-secondary btn-small" onclick="closeConfirm()" style="width:auto;flex:1;">취소</button>
      <button class="btn-primary btn-small" onclick="sendToSlack()" style="width:auto;flex:1;" id="confirmSendBtn">보내기</button>
    </div>
  </div>
</div>

<!-- History Modal -->
<div id="historyPanel" class="history-panel" onclick="closeHistory(event)">
  <div class="history-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 id="historyTitle" style="font-size:14px;">핸드오프 히스토리</h3>
      <button class="btn-ghost" onclick="closeHistoryDirect()">&#10005; 닫기</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
let selectedFrames = [];
let currentPageName = "";

const STATUS_MAP = {
  "dev-ready":     { emoji:"&#128994;", label:"Dev Ready",     slackEmoji:":large_green_circle:",  color:"#22c55e" },
  "review-needed": { emoji:"&#128992;", label:"Review Needed", slackEmoji:":large_orange_circle:", color:"#f59e0b" },
  "in-progress":   { emoji:"&#128993;", label:"In Progress",   slackEmoji:":large_yellow_circle:", color:"#eab308" },
  "updated":       { emoji:"&#128309;", label:"Updated",       slackEmoji:":large_purple_circle:", color:"#a855f7" }
};

const PRIORITY_MAP = {
  "normal":  { emoji:"", label:"" },
  "high":    { emoji:"&#128308;", label:"높음", slack:":red_circle: *높음*" },
  "urgent":  { emoji:"&#128680;", label:"긴급", slack:":rotating_light: *긴급 — 즉시 확인 필요*" }
};

// ==================== Multi-Channel Management ====================
let _channels = [];

function getChannels() {
  return _channels;
}

function saveChannels(channels) {
  _channels = channels;
  parent.postMessage({ pluginMessage: { type: "save-channels", channels } }, "*");
}

function addChannel() {
  const name = document.getElementById("newChannelName").value.trim();
  const url = document.getElementById("newChannelUrl").value.trim();
  if (!name) { showToast("채널 이름을 입력하세요.", "error"); return; }
  if (!url.startsWith("https://hooks.slack.com/")) { showToast("올바른 Webhook URL을 입력하세요.", "error"); return; }
  const channels = getChannels();
  if (channels.find(c => c.name === name)) { showToast("이미 존재하는 채널입니다.", "warning"); return; }
  channels.push({ name, url, enabled: true });
  saveChannels(channels);
  document.getElementById("newChannelName").value = "";
  document.getElementById("newChannelUrl").value = "";
  renderChannelSettings();
  renderSendChannels();
  updateWebhookIndicator();
  showToast(`${name} 채널이 추가되었습니다.`, "success");
}

function removeChannel(idx) {
  const channels = getChannels();
  const removed = channels.splice(idx, 1);
  saveChannels(channels);
  renderChannelSettings();
  renderSendChannels();
  updateWebhookIndicator();
  showToast(`${removed[0]?.name || ""} 채널이 삭제되었습니다.`, "success");
}

function renderChannelSettings() {
  const channels = getChannels();
  const container = document.getElementById("channelList");
  if (channels.length === 0) {
    container.innerHTML = '<div style="font-size:11px;color:var(--gray-400);padding:8px;text-align:center;">등록된 채널이 없습니다.</div>';
    return;
  }
  container.innerHTML = channels.map((c, i) =>
    `<div class="channel-item">
      <span class="ch-name">${escapeHtml(c.name)}</span>
      <span class="ch-url">${escapeHtml(c.url.substring(0, 40))}...</span>
      <button class="btn-ghost btn-danger" onclick="removeChannel(${i})" style="margin-top:0;">&#10005;</button>
    </div>`
  ).join("");
}

function renderSendChannels() {
  const channels = getChannels();
  const container = document.getElementById("sendChannelList");
  if (channels.length === 0) {
    container.innerHTML = '<div style="font-size:11px;color:var(--gray-400);">먼저 채널을 등록하세요.</div>';
    return;
  }
  container.innerHTML = channels.map((c, i) => {
    const hasThread = selectedFrames.some(f => f.threadMap && Object.keys(f.threadMap).length > 0);
    const threadInfo = hasThread ? '<span class="thread-badge">Thread</span>' : '';
    return `<label style="display:flex;align-items:center;gap:6px;margin:4px 0;font-weight:normal;cursor:pointer;">
      <input type="checkbox" class="channel-check" data-ch-idx="${i}" ${c.enabled !== false ? "checked" : ""} onchange="toggleChannelEnabled(${i}, this.checked)" />
      <span style="font-weight:600;">${escapeHtml(c.name)}</span>${threadInfo}
    </label>`;
  }).join("");
}

function toggleChannelEnabled(idx, checked) {
  const channels = getChannels();
  channels[idx].enabled = checked;
  saveChannels(channels);
}

function getEnabledChannels() {
  return getChannels().filter(c => c.enabled !== false);
}

// ==================== Settings ====================
function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("open");
}

function updateWebhookIndicator() {
  const indicator = document.getElementById("webhookIndicator");
  const channels = getEnabledChannels();
  if (channels.length > 0) {
    indicator.style.background = "var(--green)";
    indicator.title = `${channels.length}개 채널 활성`;
  } else {
    indicator.style.background = "var(--red)";
    indicator.title = "채널 미설정";
  }
}

// Init — 실제 데이터는 code.js에서 init-data 메시지로 받아서 렌더링
renderChannelSettings();
renderSendChannels();
updateWebhookIndicator();

function saveDesignerName() {
  parent.postMessage({ pluginMessage: { type: "save-designer", name: document.getElementById("designer").value.trim() } }, "*");
}

// ==================== Status Preview ====================
function updateStatusPreview() {
  const status = document.getElementById("status").value;
  const info = STATUS_MAP[status];
  document.getElementById("statusPreview").innerHTML = `<span class="status-badge ${status}">${info.emoji} ${info.label}</span>`;
}
updateStatusPreview();

// ==================== Frame Rendering ====================
function getFrameTypeIcon(type) {
  switch(type) {
    case "FRAME": return "&#9634;";
    case "COMPONENT": return "&#9670;";
    case "COMPONENT_SET": return "&#9670;&#9670;";
    case "SECTION": return "&#9638;";
    case "GROUP": return "&#9744;";
    default: return "&#9633;";
  }
}

function renderFrames(frames) {
  const container = document.getElementById("frameContainer");
  const sendBtn = document.getElementById("sendBtn");
  if (!frames || frames.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">&#128433;</div><div>핸드오프할 프레임을 선택하세요</div><div class="hint">Frame, Component, Section, Group 타입만 지원됩니다</div></div>`;
    sendBtn.disabled = true;
    return;
  }
  let html = `<div class="summary-bar">&#128196; <strong>${escapeHtml(currentPageName)}</strong> &middot; ${frames.length}개 프레임</div><div class="frame-list">`;
  frames.forEach(f => {
    const statusBadge = f.prevStatus ? `<span class="status-badge ${f.prevStatus}" style="font-size:9px;padding:1px 6px;">${STATUS_MAP[f.prevStatus]?.label || f.prevStatus}</span>` : "";
    const threadCount = f.threadMap ? Object.keys(f.threadMap).length : 0;
    const threadBadge = threadCount > 0 ? `<span class="thread-badge">${threadCount}ch thread</span>` : "";
    const pathLine = f.parentPath ? `<div class="frame-path">${escapeHtml(f.parentPath)}</div>` : "";
    html += `<div class="frame-item">
      <span class="frame-icon">${getFrameTypeIcon(f.type)}</span>
      <div class="frame-info">
        <div class="frame-name">${escapeHtml(f.name)} ${statusBadge} ${threadBadge}</div>
        ${pathLine}
      </div>
      <div class="frame-meta">${f.width}&times;${f.height}</div>
      <div class="frame-actions">
        ${f.prevStatus ? `<button class="btn-ghost" onclick="showHistory('${f.id}')" title="히스토리">&#128337;</button>` : ""}
        ${f.prevStatus ? `<button class="btn-ghost btn-danger" onclick="clearStatus('${f.id}')" title="상태 초기화">&#10005;</button>` : ""}
      </div>
    </div>`;
  });
  html += "</div>";
  container.innerHTML = html;
  sendBtn.disabled = false;
  renderSendChannels();
}

// ==================== Confirmation ====================
function confirmSend() {
  const channels = getEnabledChannels();
  if (channels.length === 0) { showToast("먼저 Slack 채널을 등록해주세요.", "warning"); toggleSettings(); return; }
  const designer = document.getElementById("designer").value.trim();
  if (!designer) {
    document.getElementById("designer").classList.add("error");
    showToast("담당 디자이너를 입력해주세요.", "error");
    document.getElementById("designer").focus();
    setTimeout(() => document.getElementById("designer").classList.remove("error"), 2000);
    return;
  }
  if (selectedFrames.length === 0) { showToast("프레임을 선택해주세요.", "error"); return; }

  const status = document.getElementById("status");
  const statusText = status.options[status.selectedIndex].text;
  const priority = document.getElementById("priority");
  const priorityText = priority.value !== "normal" ? priority.options[priority.selectedIndex].text : "";

  // Thread 여부 확인
  let threadInfo = "";
  const threadFrames = selectedFrames.filter(f => f.threadMap && Object.keys(f.threadMap).length > 0);
  if (threadFrames.length > 0) {
    threadInfo = `<br><span class="thread-badge" style="font-size:10px;">Thread 후속 알림 ${threadFrames.length}개 프레임</span>`;
  }

  const chNames = channels.map(c => c.name).join(", ");
  document.getElementById("confirmSummary").innerHTML = `
    <strong>${escapeHtml(designer)}</strong>님이 <strong>${selectedFrames.length}개</strong> 프레임을<br>
    <span class="status-badge ${status.value}">${statusText}</span> 상태로<br>
    <strong>${chNames}</strong> 채널에 알림 전송합니다.
    ${priorityText ? `<br>우선순위: <strong>${priorityText}</strong>` : ""}
    ${document.getElementById("jiraUrl").value.trim() ? `<br>Jira: <a href="${escapeHtml(document.getElementById("jiraUrl").value.trim())}" style="color:var(--blue);font-size:11px;">${escapeHtml(document.getElementById("jiraUrl").value.trim())}</a>` : ""}
    ${threadInfo}
    <br><br>
    <span style="font-size:11px;color:var(--gray-400);">프레임: ${selectedFrames.map(f => f.name).join(", ")}</span>
  `;
  document.getElementById("confirmOverlay").classList.add("show");
}

function closeConfirm() { document.getElementById("confirmOverlay").classList.remove("show"); }

// ==================== Slack Send (Multi-Channel + Thread) ====================
async function sendToSlack() {
  closeConfirm();
  const channels = getEnabledChannels();
  const designer = document.getElementById("designer").value.trim();
  const status = document.getElementById("status");
  const statusText = status.options[status.selectedIndex].text;
  const statusValue = status.value;
  const priority = document.getElementById("priority").value;
  const memo = document.getElementById("memo").value.trim();
  const jiraUrl = document.getElementById("jiraUrl").value.trim();

  const sendBtn = document.getElementById("sendBtn");
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="sending">&#128232; 전송 중...</span>';

  const frameLines = selectedFrames.map(f => {
    const link = f.figmaLink ? ` — <${f.figmaLink}|Figma에서 열기>` : "";
    return `• *${f.name}* (${f.type}, ${f.width}×${f.height})${link}`;
  }).join("\n");

  const now = new Date();
  const timestamp = now.toLocaleString("ko-KR", { year:"numeric", month:"long", day:"numeric", hour:"numeric", minute:"2-digit", hour12:true });

  const blocks = [
    { type:"header", text:{ type:"plain_text", text:"🚀 Dev Handoff 알림", emoji:true } },
    { type:"divider" },
    { type:"section", fields:[
      { type:"mrkdwn", text:`*상태:*\n${statusText}` },
      { type:"mrkdwn", text:`*담당:*\n${designer}` },
      { type:"mrkdwn", text:`*페이지:*\n${currentPageName}` },
      { type:"mrkdwn", text:`*프레임:*\n${selectedFrames.length}개` }
    ]}
  ];

  if (priority !== "normal") {
    blocks.push({ type:"section", text:{ type:"mrkdwn", text:`*우선순위:* ${PRIORITY_MAP[priority].slack}` } });
  }

  blocks.push({ type:"section", text:{ type:"mrkdwn", text:`*프레임 목록:*\n${frameLines}` } });

  if (jiraUrl) {
    blocks.push({ type:"section", text:{ type:"mrkdwn", text:`*🎫 Jira 티켓:*\n<${jiraUrl}|${jiraUrl}>` } });
  }

  if (memo) {
    blocks.push({ type:"section", text:{ type:"mrkdwn", text:`*📝 메모:*\n${memo}` } });
  }

  blocks.push({ type:"context", elements:[{ type:"mrkdwn", text:`🕐 ${timestamp} · Dev Handoff Notifier` }] });

  // Thread follow-up blocks (simplified for replies)
  const threadBlocks = [
    { type:"section", text:{ type:"mrkdwn", text:`🔄 *상태 업데이트: ${statusText}*\n담당: ${designer}${jiraUrl ? "\nJira: <" + jiraUrl + "|티켓 보기>" : ""}${memo ? "\n메모: " + memo : ""}` } },
    { type:"context", elements:[{ type:"mrkdwn", text:`🕐 ${timestamp}` }] }
  ];

  let successCount = 0;
  let failCount = 0;

  for (const channel of channels) {
    try {
      // Check if any selected frame has an existing thread for this channel URL
      let threadTs = null;
      for (const f of selectedFrames) {
        if (f.threadMap && f.threadMap[channel.url]) {
          threadTs = f.threadMap[channel.url];
          break;
        }
      }

      const payload = threadTs
        ? { blocks: threadBlocks, thread_ts: threadTs }
        : { blocks: blocks };

      const response = await fetch(channel.url, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "payload=" + encodeURIComponent(JSON.stringify(payload))
      });

      if (response.ok) {
        successCount++;
      } else {
        failCount++;
        console.error(`${channel.name} 전송 실패: HTTP ${response.status}`);
      }
    } catch (err) {
      failCount++;
      console.error(`${channel.name} 전송 에러:`, err);
    }
  }

  if (successCount > 0) {
    parent.postMessage({ pluginMessage: {
      type: "mark-dev-ready",
      status: statusValue,
      designer: designer,
      memo: memo,
      jiraUrl: jiraUrl
    }}, "*");
    parent.postMessage({ pluginMessage: { type: "slack-sent" } }, "*");
    showToast(`${successCount}개 채널에 전송 완료!${failCount > 0 ? ` (${failCount}개 실패)` : ""}`, "success");
    document.getElementById("memo").value = "";
  } else {
    parent.postMessage({ pluginMessage: { type: "slack-error", error: "모든 채널 전송 실패" } }, "*");
    showToast("모든 채널 전송에 실패했습니다.", "error");
  }

  sendBtn.disabled = false;
  sendBtn.innerHTML = "&#128232; Slack에 알림 보내기";
}

// ==================== History ====================
function showHistory(nodeId) {
  parent.postMessage({ pluginMessage: { type: "get-history", nodeId: nodeId } }, "*");
}

function renderHistory(nodeName, history) {
  document.getElementById("historyTitle").textContent = `${nodeName} — 히스토리`;
  const list = document.getElementById("historyList");
  if (!history || history.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--gray-400);padding:20px;">히스토리가 없습니다.</div>';
  } else {
    list.innerHTML = history.map(h => {
      const si = STATUS_MAP[h.status] || { label: h.status };
      const d = new Date(h.timestamp).toLocaleString("ko-KR", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit", hour12:true });
      return `<div class="history-item" style="border-left-color:${si.color || 'var(--gray-300)'};">
        <div><span class="status-badge ${h.status}">${si.label}</span> &middot; ${escapeHtml(h.designer)}</div>
        ${h.jiraUrl ? `<div style="margin-top:4px;"><a href="${escapeHtml(h.jiraUrl)}" style="color:var(--blue);font-size:11px;">🎫 ${escapeHtml(h.jiraUrl)}</a></div>` : ""}
        ${h.memo ? `<div style="margin-top:4px;color:var(--gray-500);">${escapeHtml(h.memo)}</div>` : ""}
        <div class="time">${d}</div>
      </div>`;
    }).join("");
  }
  document.getElementById("historyPanel").classList.add("show");
}

function closeHistory(e) { if (e.target === document.getElementById("historyPanel")) document.getElementById("historyPanel").classList.remove("show"); }
function closeHistoryDirect() { document.getElementById("historyPanel").classList.remove("show"); }

// ==================== Clear Status ====================
function clearStatus(nodeId) {
  parent.postMessage({ pluginMessage: { type: "clear-status", nodeId: nodeId } }, "*");
}

// ==================== Figma Messages ====================
window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.type === "init-data") {
    _channels = msg.channels || [];
    if (msg.designer) document.getElementById("designer").value = msg.designer;
    renderChannelSettings();
    renderSendChannels();
    updateWebhookIndicator();
    return;
  }
  if (msg.type === "selection-update") {
    selectedFrames = msg.frames;
    currentPageName = msg.pageName;
    renderFrames(msg.frames);
    if (msg.skippedCount > 0) showToast(`${msg.skippedCount}개 노드는 지원하지 않는 타입입니다.`, "warning");
  }
  if (msg.type === "history-data") renderHistory(msg.nodeName, msg.history);
};

// ==================== Keyboard Shortcut ====================
document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); const b = document.getElementById("sendBtn"); if (!b.disabled) confirmSend(); }
  if (e.key === "Escape") { closeConfirm(); closeHistoryDirect(); }
});

// ==================== Helpers ====================
function escapeHtml(str) { const d = document.createElement("div"); d.textContent = str; return d.innerHTML; }
function showToast(message, type) {
  const t = document.getElementById("toast");
  t.textContent = message;
  t.className = "toast " + type;
  requestAnimationFrame(() => { t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); });
}

// UI가 로드 완료되면 code.js에 알려서 현재 선택 정보를 받아옴
parent.postMessage({ pluginMessage: { type: "ui-ready" } }, "*");
</script>
